name: Scheduled Release

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits and push new tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get the latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Check if there are new commits since the latest tag
          # If git describe --tags matches the exact tag, no new commits have been made
          DESCRIBE_OUT=$(git describe --tags 2>/dev/null || echo "v0.0.0-new")

          if [ "$DESCRIBE_OUT" = "$LATEST_TAG" ] && [ "$LATEST_TAG" != "v0.0.0" ]; then
            echo "No new commits since $LATEST_TAG. Skipping gracefully."
            exit 0
          else
            echo "New commits found since $LATEST_TAG."

            # Extract major, minor, patch
            VERSION_NUM=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}

            # Increment patch
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

            echo "Creating and pushing new tag: $NEW_TAG"
            git tag $NEW_TAG
            git push origin $NEW_TAG
          fi
